<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ntoskrnl-rs — WebAssembly</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; background: #0b0e14; color: #c0caf5;
    font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  header { padding: 12px 16px; border-bottom: 1px solid #1f2335; background: #11141c; }
  header b { color: #7aa2f7; }
  header span { color: #565f89; }
  #console {
    flex: 1; margin: 0; padding: 16px; white-space: pre-wrap; word-break: break-word;
    overflow-y: auto;
  }
  .ok   { color: #9ece6a; }
  .fail { color: #f7768e; }
  .dim  { color: #565f89; }
  button {
    font: inherit; background: #283457; color: #c0caf5; border: 1px solid #3b4261;
    border-radius: 6px; padding: 6px 12px; cursor: pointer; margin: 8px 16px;
  }
  button:hover { background: #364a82; }
</style>
</head>
<body>
  <header>
    <b>ntoskrnl-rs</b> <span>· NT-compatible kernel running as a WebAssembly module (hardware layer = this page)</span>
  </header>
  <pre id="console"></pre>
  <button id="reboot">Reboot</button>

<script type="module">
const consoleEl = document.getElementById("console");

// Render kernel console output, lightly colorizing the self-test markers.
function emit(text) {
  for (const line of text.split(/(?<=\n)/)) {
    const span = document.createElement("span");
    if (line.includes("[ OK ]") || line.startsWith("ALL SELF TESTS PASSED")) span.className = "ok";
    else if (line.includes("[FAIL]") || line.includes("FAILED")) span.className = "fail";
    else if (line.startsWith("KiSystemStartup") || line.includes("wasm32")) span.className = "dim";
    span.textContent = line;
    consoleEl.appendChild(span);
  }
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

async function boot() {
  consoleEl.textContent = "";
  // The kernel's only "hardware" dependency in Phase 0 is console output, which
  // the host (this page) provides as the `env.host_write` import. WASM linear
  // memory stands in for physical RAM; we read the kernel's strings out of it.
  let memory;
  const imports = {
    env: {
      host_write(ptr, len) {
        const bytes = new Uint8Array(memory.buffer, ptr, len);
        emit(new TextDecoder("utf-8").decode(bytes));
      },
    },
  };
  const resp = await fetch("ntoskrnl_wasm.wasm");
  const { instance } = await WebAssembly.instantiateStreaming(resp, imports);
  memory = instance.exports.memory;
  const code = instance.exports.kernel_main();
  emit(`\n[host] kernel_main() returned ${code}\n`);
}

document.getElementById("reboot").addEventListener("click", boot);
boot();
</script>
</body>
</html>
