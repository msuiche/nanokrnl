<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ntoskrnl-rs — WebAssembly</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0b0e14; color: #c0caf5;
    font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex; flex-direction: column; height: 100vh;
  }
  header { padding: 10px 16px; border-bottom: 1px solid #1f2335; background: #11141c; }
  header b { color: #7aa2f7; }
  header span { color: #565f89; }
  #console { flex: 1; margin: 0; padding: 16px; white-space: pre-wrap; word-break: break-word; overflow-y: auto; }
  .ok   { color: #9ece6a; }
  .fail { color: #f7768e; }
  .dim  { color: #565f89; }
  #inputRow { display: flex; border-top: 1px solid #1f2335; background: #11141c; padding: 8px 16px; }
  #inputRow label { color: #7aa2f7; padding-right: 8px; white-space: pre; }
  #cmd { flex: 1; background: transparent; border: 0; color: #c0caf5; font: inherit; outline: none; }
</style>
</head>
<body>
  <header>
    <b>ntoskrnl-rs</b> <span>· interactive NT kernel as a WebAssembly module (hardware = this page; type 'help')</span>
  </header>
  <pre id="console"></pre>
  <div id="inputRow"><label>nanokrnl&gt;</label><input id="cmd" autofocus autocomplete="off" spellcheck="false"></div>

<script type="module">
const consoleEl = document.getElementById("console");
const cmdEl = document.getElementById("cmd");

// Render kernel output, lightly colorizing self-test / prompt lines.
function emit(text) {
  for (const line of text.split(/(?<=\n)/)) {
    const span = document.createElement("span");
    if (line.includes("[ OK ]") || line.startsWith("ALL SELF TESTS PASSED")) span.className = "ok";
    else if (line.includes("[FAIL]") || line.includes("FAILED") || line.includes("not recognized")) span.className = "fail";
    else if (line.startsWith("KiSystemStartup") || line.includes("wasm32") || line.startsWith("nanokrnl>")) span.className = "dim";
    span.textContent = line;
    consoleEl.appendChild(span);
  }
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

let instance, memory;
const enc = new TextEncoder();
const dec = new TextDecoder("utf-8");

// Guest programs the kernel can `run`. Preloaded at boot so host_run is sync
// (the kernel calls it synchronously). Add a program: build it, then list it.
const PROGRAMS = ["hello"];
const guestBytes = new Map();

function send(line) {
  const buf = enc.encode(line);
  const ptr = instance.exports.kernel_input_ptr();
  new Uint8Array(memory.buffer, ptr, buf.length).set(buf);
  instance.exports.kernel_input(buf.length);
}

// Instantiate <name>.wasm and bridge its sys_print syscall to the console.
function runGuest(name) {
  const bytes = guestBytes.get(name);
  if (!bytes) return -1;
  let gmem;
  const gi = new WebAssembly.Instance(new WebAssembly.Module(bytes), {
    env: { sys_print(ptr, len) { emit(dec.decode(new Uint8Array(gmem.buffer, ptr, len))); } },
  });
  gmem = gi.exports.memory;
  return gi.exports.main();
}

async function boot() {
  consoleEl.textContent = "";
  // Preload guest programs so the kernel's synchronous host_run can find them.
  for (const p of PROGRAMS) {
    try { guestBytes.set(p, new Uint8Array(await (await fetch(`${p}.wasm`)).arrayBuffer())); } catch {}
  }
  // The kernel's "hardware" is this page: console out, clear, and run-a-guest.
  const imports = {
    env: {
      host_write(ptr, len) { emit(dec.decode(new Uint8Array(memory.buffer, ptr, len))); },
      host_clear() { consoleEl.textContent = ""; },
      host_run(ptr, len) { return runGuest(dec.decode(new Uint8Array(memory.buffer, ptr, len))); },
    },
  };
  const resp = await fetch("ntoskrnl_wasm.wasm");
  ({ instance } = await WebAssembly.instantiateStreaming(resp, imports));
  memory = instance.exports.memory;
  instance.exports.kernel_main(); // boot + first prompt
  cmdEl.focus();
}

cmdEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const line = cmdEl.value;
    cmdEl.value = "";
    send(line);
  }
});
document.addEventListener("click", () => cmdEl.focus());
boot();
</script>
</body>
</html>
