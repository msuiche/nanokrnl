# Build configuration for the ring-3 console app.
#
# Same approach as the driver: the real Windows user target, core +
# compiler_builtins recompiled for it (build-std), and LLVM's MSVC-flavored
# LLD as the linker. Link arguments (subsystem, entry, no default libs) are
# injected by scripts/build-userapp.sh. No import library — the app issues
# `syscall`s directly, so it has no imports to resolve.

[build]
target = "x86_64-pc-windows-msvc"

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[target.x86_64-pc-windows-msvc]
linker = "lld-link"
