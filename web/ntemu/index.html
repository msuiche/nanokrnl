<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ntoskrnl-rs in the browser (ntemu)</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; background: #0b0e14; color: #c0caf5;
    font: 14px/1.45 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex; flex-direction: column; height: 100vh; }
  header { padding: 10px 16px; border-bottom: 1px solid #1f2335; background: #11141c; }
  header b { color: #7aa2f7; } header span { color: #565f89; }
  #bar { padding: 8px 16px; border-bottom: 1px solid #1f2335; display: flex; gap: 12px; align-items: center; }
  button { background: #1f2335; color: #c0caf5; border: 1px solid #2a2f45; border-radius: 5px; padding: 5px 12px; cursor: pointer; }
  button:hover { background: #2a2f45; }
  #screen { flex: 1; margin: 0; padding: 14px; white-space: pre-wrap; overflow-y: auto; }
  #status { color: #565f89; padding: 6px 16px; border-top: 1px solid #1f2335; }
</style>
</head>
<body>
  <header><b>ntoskrnl-rs</b> <span>· booting the real x86-64 kernel under ntemu — a ~50 KB bespoke emulator (no BIOS, no threads, no COOP/COEP)</span></header>
  <div id="bar">
    <button id="boot">Boot kernel</button>
    <label style="cursor:pointer">Load ELF… <input id="file" type="file" hidden></label>
  </div>
  <pre id="screen"></pre>
  <div id="status">loading ntemu.wasm…</div>

<script type="module">
const screen = document.getElementById("screen");
const status = document.getElementById("status");
const dec = new TextDecoder();
const print = (bytes) => { screen.textContent += dec.decode(new Uint8Array(bytes), {stream:true}); screen.scrollTop = screen.scrollHeight; };

const { instance } = await WebAssembly.instantiateStreaming(fetch("ntemu.wasm"), {});
const e = instance.exports;
status.textContent = "ntemu ready";

const RUNSTOP = ["halted", "running (idle)", "unknown-opcode", "unhandled-fault", "syscall-trap"];
function drainUart() {
  const out = [];
  let b; while ((b = e.ntemu_uart_read()) >= 0) out.push(b);
  if (out.length) print(out);
}

// Run the machine in animation-frame chunks so the UART streams to the screen
// and the page stays responsive. The kernel idles forever once booted, so we
// keep ticking until a fault/unknown opcode or the user navigates away.
function runLoop() {
  let ticks = 0;
  function frame() {
    const code = e.ntemu_run(2_000_000); // instructions per frame
    drainUart();
    ticks++;
    if (code === 1 && ticks < 600) {        // still running: keep going
      requestAnimationFrame(frame);
      status.textContent = "running — kernel idle loop (timer-driven), frame " + ticks;
    } else {
      status.textContent = "stopped: " + (RUNSTOP[code] || code);
    }
  }
  requestAnimationFrame(frame);
}

async function bootImage(bytes, asKernel) {
  screen.textContent = "";
  e.ntemu_new(128);
  const ptr = e.ntemu_image_alloc(bytes.length);
  new Uint8Array(e.memory.buffer, ptr, bytes.length).set(bytes);
  const ok = asKernel ? e.ntemu_boot_kernel() : (e.ntemu_boot_elf(0x300000n) !== 0n ? 1 : 0);
  if (!ok) { status.textContent = "failed to load image"; return; }
  runLoop();
}

document.getElementById("boot").onclick = async () => {
  status.textContent = "fetching kernel…";
  try {
    const bytes = new Uint8Array(await (await fetch("kernel")).arrayBuffer());
    await bootImage(bytes, true);
  } catch (err) {
    status.textContent = "kernel image not found — build with emu/build-wasm.sh";
  }
};
document.getElementById("file").onchange = async (ev) => {
  const f = ev.target.files[0]; if (!f) return;
  await bootImage(new Uint8Array(await f.arrayBuffer()), true);
};
</script>
</body>
</html>
